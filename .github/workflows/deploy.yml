name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Create Pages project if missing
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # Idempotent — succeeds on first run, fails harmlessly on subsequent
        # runs (project already exists). '|| true' swallows the expected error.
        run: |
          npx --yes wrangler@latest pages project create ${{ vars.CLOUDFLARE_PROJECT_NAME }} \
            --production-branch=main || true

      - name: Exclude private files from deploy
        # Wrangler honours .assetsignore for excluding files from the upload.
        # .doc-dropper/ contains activity log data that should NOT be public.
        run: |
          cat > .assetsignore <<'EOF'
          .doc-dropper
          .doc-dropper/**
          EOF

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest pages deploy . \
            --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }} \
            --branch=main \
            --commit-dirty=true
